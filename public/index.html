<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.socket.io/4.8.3/socket.io.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1 class="text-center">Socket Demo</h1>

    <section class="row">
        <section class="col col-lg-3 col-md-4 col-sm-4 border mx-auto mt-5 p-2">

            <section id="login-section">
                <form id="login-form">
                    <label class="form-label" for="username">Username</label>
                    <input class="form-control" type="text" id="username" required placeholder="Enter your name">
                    <button class="btn btn-dark btn-sm mt-3">Login</button>
                </form>
            </section>

            <section id="main-chat-section">
                <section id="chat-section">
                    <!-- <p class="rounded-pill border p-2"><span class="fw-bold">32167refhj</span>: Hello from client 1</p> -->
                </section>
                <form id="chat-form">
                    <div class="mb-3">
                        <label for="message" class="form-label">Type your message</label>
                        <textarea class="form-control" id="message" cols="30" rows="5"
                            placeholder="Enter your message"></textarea>
                        <button class="btn btn-dark btn-sm mt-3">Send</button>
                    </div>
                </form>
            </section>

        </section>
    </section>

    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
